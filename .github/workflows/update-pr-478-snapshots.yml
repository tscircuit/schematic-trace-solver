name: Update PR 478 snapshots

on:
  push:
    branches:
      - claim-34-same-net-trace-merge

permissions:
  contents: write

jobs:
  update-snapshots:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claim-34-same-net-trace-merge
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Update snapshots
        run: bun test -u
      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/examples/__snapshots__ tests/bug-reports
          if git diff --cached --quiet; then
            echo "No snapshot changes"
            exit 0
          fi
          git commit -m "test: update same-net merge snapshots"
          git push origin HEAD:claim-34-same-net-trace-merge
