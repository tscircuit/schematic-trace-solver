-anchor="middle" dominant-baseline="central">net:connectivity_net4</text><text data-type="text" data-label="net:connectivity_net5" data-x="2.0235" data-y="-7.85" x="327.52110237588784" y="321.6200960910323" fill="hsl(40, 100%, 50%, 0.9)" font-size="43.25061867049401" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">net:connectivity_net5</text><text data-type="text" data-label="net:connectivity_net6" data-x="2.0235" data-y="-8.05" x="327.52110237588784" y="322.34093973554053" fill="hsl(40, 100%, 50%, 0.9)" font-size="43.25061867049401" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">net:connectivity_net6</text><text data-type="text" data-label="net:connectivity_net7" data-x="1.6235" data-y="-8.751" x="326.0794150868714" y="324.86749670954185" fill="hsl(40, 100%, 50%, 0.9)" font-size="43.25061867049401" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">net:connectivity_net7</text>
  <g id="crosshair" style="display: none">
    <line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5" />
    <line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5" /><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text>
  </g>
  <script>
    <![CDATA[
    document.currentScript.parentElement.addEventListener('mousemove', (e) => {
      const svg = e.currentTarget;
      const rect = svg.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const crosshair = svg.getElementById('crosshair');
      const h = svg.getElementById('crosshair-h');
      const v = svg.getElementById('crosshair-v');
      const coords = svg.getElementById('coordinates');

      crosshair.style.display = 'block';
      h.setAttribute('x1', '0');
      h.setAttribute('x2', '640');
      h.setAttribute('y1', y);
      h.setAttribute('y2', y);
      v.setAttribute('x1', x);
      v.setAttribute('x2', x);
      v.setAttribute('y1', '0');
      v.setAttribute('y2', '640');

      // Calculate real coordinates using inverse transformation
      const matrix = {
        "a": 3.6042182225411676,
        "c": 0,
        "e": 320.2279668025758,
        "b": 0,
        "d": -3.6042182225411676,
        "f": 293.3269830440841
      };
      // Manually invert and apply the affine transform
      // Since we only use translate and scale, we can directly compute:
      // x' = (x - tx) / sx
      // y' = (y - ty) / sy
      const sx = matrix.a;
      const sy = matrix.d;
      const tx = matrix.e;
      const ty = matrix.f;
      const realPoint = {
        x: (x - tx) / sx,
        y: (y - ty) / sy // Flip y back since we used negative scale
      }

      coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
      coords.setAttribute('x', (x + 5).toString());
      coords.setAttribute('y', (y - 5).toString());
    });
    document.currentScript.parentElement.addEventListener('mouseleave', () => {
      document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
    });
    ]]>
  </script>
</svg>